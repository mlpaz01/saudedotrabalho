server {
    listen 80;
    listen [::]:80;
    server_name dev.saudedotrabalho.com;

    client_max_body_size 50M;

    location /plataforma/assets/ {
        alias /var/www/saudedotrabalho/dist/public/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~ ^/plataforma/(.*\.(png|jpg|jpeg|webp|svg|ico|gif|woff|woff2|ttf))$ {
        alias /var/www/saudedotrabalho/dist/public/$1;
        expires 30d;
        add_header Cache-Control "public";
    }
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
    location /plataforma {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
    location /pdfs/ {
        alias /var/www/saudedotrabalho/public/pdfs/;
        add_header Content-Disposition "inline";
        expires 7d;
    }
    location /uploads/ {
        alias /var/www/saudedotrabalho/uploads/;
        expires 30d;
    }
    location = / { return 302 /plataforma; }
}
